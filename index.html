<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Elderly Health Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f1f5f9;
}

.header{
    background:linear-gradient(135deg,#2563eb,#dbeafe);
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#1e293b;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    font-size:20px;
    font-weight:bold;
}

.value{
    display:block;
    margin-top:10px;
    font-size:30px;
    color:#2563eb;
}

.controls{
    text-align:center;
    margin:20px;
}

button{
    padding:12px 25px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.start{
    background:#16a34a;
    color:white;
}

.stop{
    background:#dc2626;
    color:white;
}

.alert{
    width:90%;
    margin:auto;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
    margin-bottom:20px;
}

.safe{
    background:#dcfce7;
    color:#166534;
}

.danger{
    background:#fee2e2;
    color:#991b1b;
}

.chart-box{
    width:95%;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    margin-bottom:30px;
}
</style>
</head>

<body>

<div class="header">🏥 AI Elderly Health Monitor</div>

<div class="container">
    <div class="card">❤️ Heart Rate <span class="value" id="heart">--</span></div>
    <div class="card">🌡 Temperature <span class="value" id="temp">--</span></div>
    <div class="card">🫁 Oxygen <span class="value" id="oxygen">--</span></div>
    <div class="card">📊 Status <span class="value" id="status">Ready</span></div>
</div>

<div class="controls">
    <button class="start" onclick="startMonitoring()">▶ Start Monitoring</button>
    <button class="stop" onclick="stopMonitoring()">⛔ Stop Monitoring</button>
</div>

<div id="alert" class="alert safe">Waiting for monitoring...</div>

<div class="chart-box">
    <canvas id="healthChart"></canvas>
</div>

<script>
let interval = null;

const ctx = document.getElementById("healthChart").getContext("2d");

const chart = new Chart(ctx,{
    type:"line",
    data:{
        labels:[],
        datasets:[
            {
                label:"Heart Rate",
                data:[],
                borderColor:"blue",
                borderWidth:3,
                fill:false,
                tension:0.3
            },
            {
                label:"Oxygen Level",
                data:[],
                borderColor:"green",
                borderWidth:3,
                fill:false,
                tension:0.3
            }
        ]
    },
    options:{
        responsive:true,
        animation:false,
        scales:{
            y:{
                beginAtZero:false
            }
        }
    }
});

function startMonitoring(){

    if(interval) return;

    interval = setInterval(()=>{

        let heart = Math.floor(Math.random()*30)+70;
        let temp = (Math.random()*2+36).toFixed(1);
        let oxygen = Math.floor(Math.random()*12)+88;

        document.getElementById("heart").innerText = heart + " BPM";
        document.getElementById("temp").innerText = temp + " °C";
        document.getElementById("oxygen").innerText = oxygen + " %";

        chart.data.labels.push("");
        chart.data.datasets[0].data.push(heart);
        chart.data.datasets[1].data.push(oxygen);

        if(chart.data.labels.length > 20){
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
            chart.data.datasets[1].data.shift();
        }

        chart.update();

        const alertBox = document.getElementById("alert");
        const status = document.getElementById("status");

        if(oxygen < 95){
            alertBox.className = "alert danger";
            alertBox.innerHTML = "🚨 LOW OXYGEN ALERT!";
            status.innerText = "Critical";
        }else{
            alertBox.className = "alert safe";
            alertBox.innerHTML = "✅ Patient Stable";
            status.innerText = "Normal";
        }

    },1000);
}

function stopMonitoring(){
    clearInterval(interval);
    interval = null;
    document.getElementById("status").innerText = "Stopped";
}
</script>

</body>
</html>
